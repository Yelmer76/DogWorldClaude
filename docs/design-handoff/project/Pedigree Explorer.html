<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DogWorld — Pedigree Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">

<style>
/* ─────────────────────────────────────────────────────────────────────────────
   TOKENS — copied from design system v0.1 (Sage / Navy / Oatmeal trio)
   ───────────────────────────────────────────────────────────────────────── */
:root {
  --forest-900: #243430;
  --forest-700: #3F5A55;
  --forest-500: #6b8581;
  --forest-100: #dde4e2;
  --forest-50:  #edf1f0;

  --ochre-700:  #11253a;
  --ochre-600:  #1C3245;
  --ochre-200:  #b8c4d0;
  --ochre-50:   #e6ebef;

  --bg-page:    #F5F2ED;
  --bg-card:    #ffffff;

  --n-950: #1a1a1a;
  --n-700: #5d5d5d;
  --n-500: #9a9a9a;
  --n-300: #c4c0b7;
  --n-200: #dcd8cf;
  --n-100: #ebe7de;
  --n-50:  #efebe2;

  --success-bg: #e3ede2;  --success-fg: #3d6b46;  --success-dot: #4a7c59;
  --warning-bg: #f3e6cc;  --warning-fg: #8a5a1a;  --warning-dot: #c98a27;
  --error-bg:   #edd6d2;  --error-fg:   #8a3f3a;  --error-dot:   #a8504a;
  --info-bg:    #dde4ec;  --info-fg:    #41617f;  --info-dot:    #5a7a9a;

  --t-12: 12px; --t-14: 14px; --t-16: 16px; --t-18: 18px; --t-20: 20px;
  --t-24: 24px; --t-30: 30px; --t-36: 36px; --t-48: 48px;

  --s-1: 4px; --s-2: 8px; --s-3: 12px; --s-4: 16px;
  --s-6: 24px; --s-8: 32px; --s-12: 48px; --s-16: 64px;

  --r-tag: 4px; --r-btn: 6px; --r-card: 8px; --r-pill: 999px;

  --shadow-0: none;
  --shadow-1: 0 1px 2px rgba(26, 26, 26, 0.04), 0 1px 1px rgba(26, 26, 26, 0.03);
  --shadow-2: 0 2px 4px rgba(26, 26, 26, 0.05), 0 4px 12px rgba(26, 26, 26, 0.05);
  --shadow-3: 0 8px 24px rgba(26, 26, 26, 0.08), 0 2px 6px rgba(26, 26, 26, 0.05);

  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  font-size: var(--t-16);
  line-height: 1.5;
  color: var(--n-950);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─────────────────────────────────────────────────────────────────────────────
   PAGE SHELL
   ───────────────────────────────────────────────────────────────────────── */
.page-root {
  max-width: 1640px;
  margin: 0 auto;
  padding: 32px 24px 64px;
}
.page-head { margin-bottom: 32px; max-width: 880px; }
.page-eyebrow {
  font-size: 12px; color: var(--ochre-700);
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;
  margin-bottom: 8px;
}
.page-head h1 {
  font-size: 36px; margin: 0 0 12px;
  font-weight: 600; letter-spacing: -0.02em;
}
.page-sub { color: var(--n-700); margin: 0; font-size: 16px; line-height: 1.55; }
.page-sub strong { color: var(--n-950); font-weight: 600; }

.frames {
  display: grid;
  grid-template-columns: 375px 1fr;
  gap: 40px;
  align-items: start;
  margin-bottom: 48px;
}
@media (max-width: 1280px) {
  .frames { grid-template-columns: 1fr; }
}
.frame-col { min-width: 0; }
.frame-meta {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 12px;
}
.frame-label {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.06em;
  color: var(--n-700);
}
.frame-hint { font-size: 12px; color: var(--n-500); font-family: var(--font-mono); }

/* ─────────────────────────────────────────────────────────────────────────────
   DEVICE FRAMES
   ───────────────────────────────────────────────────────────────────────── */
.device-mobile {
  width: 375px;
  height: 812px;
  border-radius: 40px;
  background: #1a1a1a;
  padding: 12px;
  box-shadow: var(--shadow-3);
  flex-shrink: 0;
}
.device-mobile-screen {
  width: 100%; height: 100%;
  border-radius: 28px;
  background: var(--bg-page);
  overflow: hidden;
  position: relative;
}

.device-desktop {
  width: 100%;
  max-width: 1280px;
  border-radius: 10px;
  background: var(--n-100);
  box-shadow: var(--shadow-3);
  overflow: hidden;
  border: 1px solid var(--n-200);
}
.device-desktop-chrome {
  display: flex; align-items: center; gap: 8px;
  height: 32px; padding: 0 12px;
  background: #e8e5dd;
  border-bottom: 1px solid var(--n-200);
}
.device-desktop-chrome .dot { width: 11px; height: 11px; border-radius: 50%; }
.device-desktop-chrome .dot.r { background: #ec6a5e; }
.device-desktop-chrome .dot.y { background: #f4be4f; }
.device-desktop-chrome .dot.g { background: #62c554; }
.device-desktop-chrome .device-url {
  margin-left: auto; margin-right: auto;
  font-family: var(--font-mono); font-size: 11px; color: var(--n-700);
  background: var(--bg-card); padding: 3px 12px; border-radius: 6px;
}
.device-desktop-screen {
  height: 768px; background: var(--bg-page); overflow: auto;
}

/* ─────────────────────────────────────────────────────────────────────────────
   MOBILE SHELL
   ───────────────────────────────────────────────────────────────────────── */
.mobile-shell {
  height: 100%; display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  position: relative;
}
.m-topbar {
  background: var(--bg-card);
  padding: 14px 16px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--n-100);
  position: sticky; top: 0; z-index: 5;
}
.m-topbar .title { font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }

/* Breadcrumb */
.crumb-strip {
  background: var(--bg-card);
  padding: 10px 16px;
  border-bottom: 1px solid var(--n-100);
  display: flex; align-items: center; gap: 8px;
  overflow-x: auto;
  white-space: nowrap;
  scrollbar-width: none;
}
.crumb-strip::-webkit-scrollbar { display: none; }
.crumb-label {
  font-size: 10px; color: var(--n-500); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding-right: 4px;
  flex-shrink: 0;
}
.crumb-item {
  background: transparent; border: 0;
  font-family: inherit; font-size: 13px; color: var(--n-700);
  padding: 4px 8px; border-radius: 6px;
  cursor: pointer; white-space: nowrap;
  font-weight: 500;
}
.crumb-item:hover:not(:disabled) { background: var(--n-50); color: var(--n-950); }
.crumb-item.is-current {
  background: var(--forest-50); color: var(--forest-700);
  cursor: default;
}
.crumb-sep { color: var(--n-300); flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 1.5; }

/* Anim stage — transforms only, never opacity. Ensures content is always
   visible even when the iframe's animation timer doesn't tick (capture mode). */
.anim-stage {
  padding: 16px 16px 96px;
}
.d-tree.anim-stage { padding: 0; }

.anim-up    { animation: enter-up 280ms cubic-bezier(0.22, 0.61, 0.36, 1) both; }
.anim-down  { animation: enter-down 280ms cubic-bezier(0.22, 0.61, 0.36, 1) both; }
.anim-lateral { animation: enter-lateral 280ms cubic-bezier(0.22, 0.61, 0.36, 1) both; }
.anim-jump  { animation: enter-fade 220ms ease-out both; }

@keyframes enter-up      { from { transform: translateY(-10px); } to { transform: translateY(0); } }
@keyframes enter-down    { from { transform: translateY(10px);  } to { transform: translateY(0); } }
@keyframes enter-lateral { from { transform: translateX(12px);  } to { transform: translateX(0); } }
@keyframes enter-fade    { from { transform: scale(0.995); }      to { transform: scale(1); } }

/* Tree spacer — a thin vertical connector between generations.
   Generation is conveyed by position + card size, not by side labels. */
.tree-spacer {
  height: 14px;
  position: relative;
}
.tree-spacer::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  width: 1px;
  background: var(--n-200);
  transform: translateX(-50%);
}

/* ─────────────────────────────────────────────────────────────────────────────
   NODE CARDS (mobile + reused in desktop tree)
   ───────────────────────────────────────────────────────────────────────── */
.node-card {
  position: relative;
  background: var(--bg-card);
  border: 1px solid var(--n-200);
  border-radius: var(--r-card);
  padding: 10px 32px 10px 14px;
  display: flex; gap: 10px; align-items: center;
  cursor: pointer;
  font-family: inherit; text-align: left;
  width: 100%;
  transition: border-color 80ms ease, box-shadow 80ms ease, transform 80ms ease;
  overflow: hidden;
}
.node-card::before {
  content: ""; position: absolute;
  left: 0; top: 0; bottom: 0; width: 4px;
  background: var(--n-200);
}
.node-card:hover { border-color: var(--n-300); box-shadow: var(--shadow-1); transform: translateY(-1px); }
.node-card.is-sire::before { background: #5a7a9a; }
.node-card.is-dam::before { background: #c0789a; }

.node-card.is-sm {
  padding: 8px 24px 8px 12px;
  gap: 8px;
}
.node-card.is-lg {
  padding: 12px 36px 12px 16px;
  gap: 12px;
}
.node-card.is-deceased { opacity: 0.78; }

.node-body { display: flex; flex-direction: column; gap: 2px; min-width: 0; flex: 1; }
.node-titles {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 0.05em; color: var(--ochre-700);
  font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.node-name {
  font-size: 13px; font-weight: 600; letter-spacing: -0.005em;
  line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.node-name .kennel-suffix { color: var(--n-500); font-weight: 400; }
.node-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; color: var(--n-700);
  font-family: var(--font-mono);
}
.node-meta .flag { font-family: var(--font-sans); }
.node-meta .deceased {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; color: var(--n-500);
  font-family: var(--font-mono);
}
/* Health pip — single status indicator (replaces full chip strip on tree cards) */
.health-pip {
  position: absolute;
  top: 10px; right: 30px;
  width: 8px; height: 8px; border-radius: 50%;
  box-shadow: 0 0 0 2px var(--bg-card);
  flex-shrink: 0;
}
.node-card.is-sm .health-pip { right: 22px; top: 8px; width: 6px; height: 6px; }

.tap-affordance {
  position: absolute; right: 10px; top: 50%;
  transform: translateY(-50%); color: var(--n-300);
  stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
}
.node-card:hover .tap-affordance { color: var(--n-700); }

/* Empty / hidden states */
.node-empty {
  background: transparent;
  border: 1px dashed var(--n-300);
  border-radius: var(--r-card);
  padding: 16px;
  cursor: pointer;
  font-family: inherit;
  width: 100%; min-height: 64px;
}
.node-empty::before { display: none; }
.node-empty-inner {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  color: var(--n-500); font-size: 12px;
  stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round;
}
.node-empty:hover { background: var(--n-50); border-color: var(--n-700); color: var(--n-950); }
.node-empty:hover .node-empty-inner { color: var(--n-950); }

.node-hidden {
  background: var(--n-50);
  border: 1px solid var(--n-100);
  border-radius: var(--r-card);
  padding: 12px 14px;
  display: flex; align-items: center; gap: 8px;
  font-family: inherit;
  width: 100%; min-height: 64px;
  cursor: not-allowed;
}
.node-hidden::before { display: none; }
.node-hidden-name { font-size: 13px; font-weight: 500; color: var(--n-700); }
.node-hidden-meta {
  margin-left: auto;
  font-size: 10px; color: var(--n-500); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
}

/* Photo placeholder */
.photo {
  background:
    repeating-linear-gradient(135deg,
      var(--n-100) 0px, var(--n-100) 8px,
      var(--n-50) 8px, var(--n-50) 16px);
  display: grid; place-items: center;
  color: var(--n-500); font-family: var(--font-mono);
  letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500;
  flex-shrink: 0;
}

/* Mobile rows — full-width, centered content (no gutter). */
.grandparents-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.parents-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}

/* ─────────────────────────────────────────────────────────────────────────────
   FOCAL CARD
   ───────────────────────────────────────────────────────────────────────── */
.focal-anchor {
  position: relative;
  margin: 0 0 6px;
}
.focal-badge {
  position: absolute; top: -10px; left: 16px;
  background: var(--forest-700); color: white;
  padding: 3px 10px; border-radius: var(--r-tag);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  z-index: 2;
}
.focal-card {
  background: var(--bg-card);
  border: 2px solid var(--forest-700);
  border-radius: var(--r-card);
  padding: 18px 16px 16px;
  display: flex; gap: 14px;
  box-shadow: 0 0 0 4px rgba(63, 90, 85, 0.10), var(--shadow-2);
}
.focal-photo-btn {
  position: relative;
  background: transparent; border: 0; padding: 0; cursor: pointer;
}
.focal-photo-btn .photo {
  border-radius: var(--r-card);
}
.photo-expand {
  position: absolute; bottom: 4px; right: 4px;
  width: 22px; height: 22px;
  background: rgba(26, 26, 26, 0.78); color: white;
  border-radius: 50%;
  display: grid; place-items: center;
  stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round;
}
.focal-body { flex: 1; min-width: 0; }
.focal-name {
  font-size: 19px; font-weight: 600;
  letter-spacing: -0.01em; line-height: 1.15;
  margin: 4px 0 6px;
  text-wrap: balance;
}
.focal-meta {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--n-700);
  font-family: var(--font-mono);
  flex-wrap: wrap;
}
.focal-meta .flag { font-family: var(--font-sans); }
.focal-meta .dot-sep { color: var(--n-300); }
.kennel-line {
  font-size: 11px; color: var(--n-500);
  margin-top: 4px;
}

/* ─────────────────────────────────────────────────────────────────────────────
   CAROUSELS
   ───────────────────────────────────────────────────────────────────────── */
.carousel { margin-top: 18px; }
.carousel-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.carousel-label {
  font-size: 11px; color: var(--n-500); font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
}
.carousel-count {
  display: inline-grid; place-items: center;
  min-width: 18px; height: 18px; padding: 0 5px;
  border-radius: 999px;
  background: var(--n-100); color: var(--n-700);
  font-size: 11px; font-weight: 600;
}
.carousel-track {
  display: flex; gap: 8px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  padding-bottom: 4px;
  margin: 0 -16px;
  padding: 0 16px 4px;
  scrollbar-width: thin;
}
.carousel-track::-webkit-scrollbar { height: 4px; }
.carousel-track::-webkit-scrollbar-thumb { background: var(--n-200); border-radius: 2px; }

.carousel-card {
  flex-shrink: 0;
  width: 152px;
  background: var(--bg-card);
  border: 1px solid var(--n-200);
  border-radius: var(--r-card);
  padding: 8px 10px 8px 12px;
  display: flex; gap: 8px; align-items: center;
  scroll-snap-align: start;
  cursor: pointer;
  font-family: inherit; text-align: left;
  position: relative;
  overflow: hidden;
}
.carousel-card::before {
  content: ""; position: absolute;
  left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--n-200);
}
.carousel-card.is-sire::before { background: #5a7a9a; }
.carousel-card.is-dam::before  { background: #c0789a; }
.carousel-card:hover { border-color: var(--n-300); }
.carousel-card-body { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
.carousel-titles { font-family: var(--font-mono); font-size: 9px; color: var(--ochre-700); letter-spacing: 0.05em; font-weight: 500; }
.carousel-name { font-size: 12px; font-weight: 600; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.carousel-meta {
  display: flex; align-items: center; gap: 4px;
  font-size: 10px; color: var(--n-700); font-family: var(--font-mono);
}

.carousel-empty {
  font-size: 12px; color: var(--n-500);
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px dashed var(--n-200);
  border-radius: var(--r-card);
}

/* ─────────────────────────────────────────────────────────────────────────────
   TAGS — reused from design system
   ───────────────────────────────────────────────────────────────────────── */
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px;
  border-radius: var(--r-tag);
  font-size: 11px; font-weight: 500; line-height: 1.4;
  background: var(--n-50); color: var(--n-700);
  white-space: nowrap;
}
.tag--success { background: var(--success-bg); color: var(--success-fg); }
.tag--warning { background: var(--warning-bg); color: var(--warning-fg); }
.tag--error   { background: var(--error-bg);   color: var(--error-fg); }
.tag--info    { background: var(--info-bg);    color: var(--info-fg); }

.badge-title {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
  padding: 3px 7px;
  border-radius: var(--r-tag);
  background: var(--forest-50); color: var(--forest-700);
  letter-spacing: 0.04em;
}

/* ─────────────────────────────────────────────────────────────────────────────
   BUTTONS — reused
   ───────────────────────────────────────────────────────────────────────── */
.btn {
  font-family: inherit;
  font-size: 14px; font-weight: 500; line-height: 1;
  padding: 10px 14px;
  border-radius: var(--r-btn);
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 8px;
  transition: background-color 80ms ease, border-color 80ms ease, color 80ms ease;
}
.btn--primary { background: var(--ochre-600); color: #ffffff; border-color: var(--ochre-600); }
.btn--primary:hover { background: #25415a; border-color: #25415a; }
.btn--secondary { background: var(--bg-card); border-color: var(--n-200); color: var(--n-950); }
.btn--secondary:hover { background: var(--n-50); border-color: var(--n-300); }
.btn--ghost { background: transparent; color: var(--forest-700); }
.btn--ghost:hover { background: var(--forest-50); }
.btn--icon {
  width: 36px; height: 36px; padding: 0; justify-content: center;
  border: 1px solid var(--n-200); background: var(--bg-card);
  color: var(--n-700);
}
.btn--icon:hover { background: var(--n-50); color: var(--n-950); }

.i { display: inline-block; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }

/* ─────────────────────────────────────────────────────────────────────────────
   FAB (mobile share)
   ───────────────────────────────────────────────────────────────────────── */
.fab {
  position: absolute;
  bottom: 24px; right: 20px;
  width: 52px; height: 52px;
  border-radius: 50%;
  background: var(--ochre-600); color: white;
  border: 0; cursor: pointer;
  box-shadow: var(--shadow-3);
  display: grid; place-items: center;
  z-index: 4;
}
.fab:hover { background: #25415a; }

/* ─────────────────────────────────────────────────────────────────────────────
   DESKTOP SHELL
   ───────────────────────────────────────────────────────────────────────── */
.desktop-shell {
  height: 100%; min-height: 768px;
  display: flex; flex-direction: column;
  background: var(--bg-page);
}
.d-topbar {
  height: 52px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--n-100);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
}
.d-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600;
}
.d-brand .mark {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--forest-700); color: white;
  display: grid; place-items: center; font-size: 12px; font-weight: 700;
}
.d-context {
  margin-left: 12px;
  font-size: 13px; font-weight: 400; color: var(--n-500);
}

.d-body {
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  flex: 1;
  min-height: 0;
}

/* Left rail */
.d-left {
  background: var(--bg-card);
  border-right: 1px solid var(--n-100);
  padding: 16px 12px;
  display: flex; flex-direction: column; gap: 16px;
  overflow-y: auto;
}
.search {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: var(--n-50);
  border: 1px solid transparent;
  border-radius: var(--r-btn);
}
.search:focus-within { border-color: var(--forest-700); background: var(--bg-card); }
.search-input {
  border: 0; background: transparent; outline: none;
  font-family: inherit; font-size: 13px; flex: 1;
  min-width: 0;
}
.search kbd {
  font-family: var(--font-mono); font-size: 10px;
  background: var(--bg-card); border: 1px solid var(--n-200);
  border-radius: 3px; padding: 1px 5px;
  color: var(--n-500);
}

.rail-section { display: flex; flex-direction: column; gap: 4px; }
.rail-label {
  font-size: 10px; color: var(--n-500); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 4px 6px 6px;
}
.rail-history-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 6px 8px;
  background: transparent; border: 0;
  font-family: inherit; text-align: left;
  border-radius: 6px; cursor: pointer;
  color: var(--n-700);
  width: 100%;
}
.rail-history-item:hover:not(:disabled) { background: var(--n-50); color: var(--n-950); }
.rail-history-item.is-current { background: var(--forest-50); color: var(--forest-700); cursor: default; }
.rail-history-item.is-current .rail-dot { background: var(--forest-700); }
.rail-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--n-300); margin-top: 6px;
  flex-shrink: 0;
}
.rail-history-body { display: flex; flex-direction: column; gap: 1px; min-width: 0; flex: 1; }
.rail-history-name { font-size: 13px; font-weight: 500; }
.rail-history-titles {
  font-family: var(--font-mono); font-size: 9px;
  color: var(--ochre-700); letter-spacing: 0.05em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.rail-saved {
  background: transparent; border: 0;
  font-family: inherit; text-align: left;
  font-size: 12px; color: var(--n-700);
  padding: 6px 8px; border-radius: 6px;
  cursor: pointer;
}
.rail-saved:hover { background: var(--n-50); color: var(--n-950); }

.kb-hints {
  margin-top: auto;
  background: var(--n-50);
  border-radius: var(--r-card);
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 4px;
}
.kb-hints-head {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 10px; color: var(--n-500); font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 4px;
}
.kb-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--n-700);
}
.kb-row kbd {
  font-family: var(--font-mono); font-size: 10px;
  background: var(--bg-card); border: 1px solid var(--n-200);
  border-bottom-width: 2px;
  border-radius: 3px; padding: 1px 5px;
  min-width: 22px; text-align: center;
}

/* Center tree */
.d-center {
  overflow-y: auto;
  padding: 16px 24px 24px;
  display: flex; flex-direction: column; gap: 14px;
  min-height: 0;
}
.d-crumb-row {
  background: var(--bg-card);
  border-radius: var(--r-card);
  border: 1px solid var(--n-100);
}
.d-crumb-row .crumb-strip {
  border-bottom: 0; padding: 8px 12px;
}

.d-tree {
  display: flex; flex-direction: column; gap: 10px;
  align-items: stretch;
  padding-bottom: 24px;
}
.d-gen-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--n-500);
  text-align: center;
}
.d-gen-label.is-focal { color: var(--forest-700); }

.d-grandparents {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}
.d-parents {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 0 12%;
}
.d-focal {
  padding: 0 22%;
}

.d-connectors {
  width: 100%; height: 18px;
  stroke: var(--n-200); fill: none;
  stroke-width: 0.02; vector-effect: non-scaling-stroke;
  margin: -2px 0;
}
.d-connectors path { stroke: var(--n-200); stroke-width: 1; }

.d-bottom {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 18px;
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px dashed var(--n-200);
}
.d-bottom .carousel-track { margin: 0; padding: 0 0 4px; }
.d-bottom .carousel-card { width: 168px; }

/* Right rail */
.d-right {
  background: var(--bg-card);
  border-left: 1px solid var(--n-100);
  padding: 16px 16px;
  display: flex; flex-direction: column; gap: 18px;
  overflow-y: auto;
}
.cred-list { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 6px; }
.health-list { display: flex; flex-direction: column; gap: 6px; padding: 0 6px; }
.health-line {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 12px;
  padding: 6px 8px;
  background: var(--n-50);
  border-radius: 6px;
}
.health-k { font-family: var(--font-mono); color: var(--n-700); }
.health-v { font-family: var(--font-mono); font-weight: 500; }

.results-list { display: flex; flex-direction: column; gap: 4px; padding: 0 6px; }
.result-item {
  display: flex; gap: 8px; align-items: baseline;
  font-size: 12px;
  padding: 4px 0;
  border-top: 1px solid var(--n-100);
}
.result-item:first-child { border-top: 0; }
.result-y { font-family: var(--font-mono); color: var(--n-500); width: 28px; flex-shrink: 0; }
.result-t { color: var(--n-950); }

.origin-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 8px;
}

/* ─────────────────────────────────────────────────────────────────────────────
   MODALS
   ───────────────────────────────────────────────────────────────────────── */
.modal-back {
  position: fixed; inset: 0;
  background: rgba(26, 26, 26, 0.40);
  display: grid; place-items: center;
  padding: 24px;
  z-index: 100;
  animation: fade-in 160ms ease-out;
}
.modal-back.is-dark { background: rgba(10, 10, 10, 0.88); }
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--bg-card);
  border-radius: var(--r-card);
  width: 480px; max-width: 100%;
  box-shadow: var(--shadow-3);
  animation: pop-in 200ms cubic-bezier(0.22, 0.61, 0.36, 1);
}
@keyframes pop-in { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }

.modal-head {
  padding: 18px 20px 12px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
}
.modal-head h3 { margin: 0 0 4px; font-size: 18px; font-weight: 600; letter-spacing: -0.01em; }
.modal-head p { margin: 0; font-size: 13px; color: var(--n-700); max-width: 36ch; }

.modal-body { padding: 4px 20px 20px; }
.url-box {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 6px 6px 12px;
  background: var(--n-50);
  border: 1px solid var(--n-200);
  border-radius: var(--r-btn);
}
.url-box .url {
  font-family: var(--font-mono); font-size: 12px;
  color: var(--n-700); flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.share-actions {
  display: flex; gap: 8px; margin-top: 14px;
  flex-wrap: wrap;
}

.gallery {
  background: #0a0a0a;
  color: white;
  width: 720px; max-width: 100%;
  padding: 20px;
  border-radius: var(--r-card);
  display: flex; flex-direction: column; gap: 16px;
  animation: pop-in 200ms cubic-bezier(0.22, 0.61, 0.36, 1);
}
.gallery-head {
  display: flex; justify-content: space-between; align-items: flex-start;
}
.gallery-name { font-size: 20px; font-weight: 600; margin-top: 4px; }
.gallery-main {
  display: grid; place-items: center;
  background: rgba(255,255,255,0.04);
  border-radius: var(--r-card);
  padding: 12px;
}
.gallery-main .photo {
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 12px,
      rgba(255,255,255,0.02) 12px, rgba(255,255,255,0.02) 24px);
  color: rgba(255,255,255,0.4);
  width: 100% !important; max-width: 520px; aspect-ratio: 1; height: auto !important;
}
.gallery-thumbs {
  display: flex; gap: 8px; overflow-x: auto;
  padding-bottom: 4px;
}
.gallery-thumb {
  flex-shrink: 0;
  border-radius: var(--r-card);
  overflow: hidden;
  opacity: 0.65;
}
.gallery-thumb:first-child { opacity: 1; outline: 2px solid white; outline-offset: -2px; }

/* ─────────────────────────────────────────────────────────────────────────────
   EDGE CASES PANEL
   ───────────────────────────────────────────────────────────────────────── */
.edge-panel {
  background: var(--bg-card);
  border: 1px solid var(--n-100);
  border-radius: 14px;
  padding: 28px;
  box-shadow: var(--shadow-1);
}
.edge-head { margin-bottom: 20px; max-width: 64ch; }
.edge-eyebrow {
  font-size: 12px; color: var(--ochre-700);
  letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;
}
.edge-head h3 { margin: 6px 0 8px; font-size: 24px; font-weight: 600; letter-spacing: -0.01em; }
.edge-head p { margin: 0; color: var(--n-700); font-size: 14px; }
.edge-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
@media (max-width: 900px) {
  .edge-grid { grid-template-columns: 1fr; }
}
.edge-item { display: flex; flex-direction: column; gap: 10px; }
.edge-label {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--n-500);
}
.edge-desc {
  margin: 0; font-size: 13px; color: var(--n-700); line-height: 1.5;
}

/* Footer */
.page-foot {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--n-100);
  display: flex; justify-content: space-between; gap: 32px;
  color: var(--n-500); font-size: 12px;
}

</style>
